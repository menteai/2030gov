<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&lt;2030년 국가 경영 시뮬레이션&gt;</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div>
          <h1>&lt;2030년 국가 경영 시뮬레이션&gt;</h1>
          <p class="status-line" id="difficultyText">2030년대 자동화 충격이 시작되었습니다.</p>
        </div>
        <div class="time-board" aria-label="현재 국가 시간">
          <div>
            <span>현재 날짜</span>
            <strong id="currentDate">2030년 01월 01일</strong>
          </div>
          <div>
            <span>존속 기간</span>
            <strong id="survivalText">0년 0개월</strong>
          </div>
          <div>
            <span>점수</span>
            <strong id="scoreText">0개월</strong>
          </div>
        </div>
      </header>

      <main class="game-grid" aria-live="polite">
        <section class="panel metrics-panel" aria-labelledby="metricsTitle">
          <div class="section-head">
            <h2 id="metricsTitle">국가 지표</h2>
            <span>0이 되면 붕괴</span>
          </div>
          <div class="metric-list" id="metricList"></div>
        </section>

        <section class="panel policy-panel" aria-labelledby="policyTitle">
          <div class="section-head">
            <h2 id="policyTitle">정책 Bar</h2>
            <span>즉시 반영</span>
          </div>
          <div class="policy-list" id="policyList"></div>
        </section>

        <section class="event-card" aria-labelledby="eventTitle">
          <div class="event-heading">
            <span id="eventCategory">상황 보고</span>
            <strong id="eventTitle">국가 운영 시작</strong>
          </div>
          <p id="eventBody">정책 Bar를 조절해 국고, 소비력, 고용율, 국내 자본, 정부 지지율을 동시에 버티게 하십시오.</p>
          <div class="event-effects" id="eventEffects"></div>
          <p class="notice" id="noticeText">알림: 소비자와 기업, 재정은 서로를 필요로 하지만 같은 방향으로 움직이지 않습니다.</p>
        </section>
      </main>
    </div>

    <div class="collapse-screen hidden" id="collapseScreen" role="dialog" aria-modal="true" aria-labelledby="collapseTitle">
      <div class="collapse-panel">
        <p>국가 붕괴</p>
        <h2 id="collapseTitle">국가 붕괴</h2>
        <div class="collapse-stats">
          <span>존속 기간</span>
          <strong id="finalSurvival">0년 0개월</strong>
          <span>최종 점수</span>
          <strong id="finalScore">0개월</strong>
          <span>붕괴 원인</span>
          <strong id="collapseReason">국고</strong>
        </div>
        <button type="button" id="restartButton">다시 운영</button>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
