<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2030년 국가 경영 시뮬레이션</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div>
          <h1>2030년 국가 경영 시뮬레이션</h1>
          <p id="phaseText" class="phase">0년차 · 자동화 충격 개시</p>
        </div>
        <section class="time-panel" aria-label="시간과 점수">
          <div>
            <span>현재 날짜</span>
            <strong id="dateText">2030년 01월 01일</strong>
          </div>
          <div>
            <span>존속 기간</span>
            <strong id="survivalText">0년 0개월</strong>
          </div>
          <div>
            <span>점수</span>
            <strong id="scoreText">0개월</strong>
          </div>
        </section>
      </header>

      <section class="layout">
        <section class="metrics-panel" aria-label="핵심 지표">
          <div class="section-head">
            <h2>국가 지표</h2>
            <button id="restartButton" class="icon-button" type="button" aria-label="다시 시작" title="다시 시작">↻</button>
          </div>
          <div id="metrics" class="metrics"></div>
          <div class="graph-wrap">
            <canvas id="historyCanvas" width="980" height="300" aria-label="지표 변화 그래프"></canvas>
          </div>
        </section>

        <aside class="policy-panel" aria-label="정책 조정">
          <div class="section-head">
            <h2>정책</h2>
            <span id="pressureText" class="pressure">균형 상태</span>
          </div>
          <div id="policies" class="policies"></div>
        </aside>
      </section>

      <section class="event-area" aria-label="최근 이벤트">
        <article id="eventCard" class="event-card">
          <div class="event-category">시뮬레이션 시작</div>
          <h2>정책 bar를 조절해 국가를 유지하십시오</h2>
          <p>고용 붕괴는 먼저 오고, 소비 붕괴는 뒤늦게 따라옵니다.</p>
          <div id="eventEffects" class="event-effects"></div>
        </article>
        <p id="noticeText" class="notice">알림: 국가가 2030년 01월 01일부터 실시간으로 운영됩니다.</p>
      </section>

      <section id="gameOver" class="game-over" aria-modal="true" role="dialog" hidden>
        <div class="modal">
          <h2>국가 붕괴</h2>
          <p id="finalSurvival">존속 기간: 0년 0개월</p>
          <p id="finalScore">최종 점수: 0개월</p>
          <p id="collapseCause">붕괴 원인: 국고</p>
          <button id="modalRestartButton" type="button">다시 시작</button>
        </div>
      </section>
    </main>

    <script src="simulation.js"></script>
    <script src="app.js"></script>
  </body>
</html>
